<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 &mdash; 97 112 99</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/favicon.svg"><rect width="32" height="32" fill="%23fff"/><text x="9" y="22" font-family="'Space Mono',monospace" font-size="16" font-weight="700" text-anchor="middle" fill="%23a83a3a">9</text><text x="23" y="22" font-family="'Space Mono',monospace" font-size="16" font-weight="700" text-anchor="middle" fill="%233a7a3a">7</text></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root { --black: #0a0a0a; --rule: #d0d0d0; }

  body {
    font-family: 'Space Mono', monospace;
    background: #fff;
    color: var(--black);
    min-height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 40px 24px;
  }

  .code-container {
    position: relative;
    min-height: 120px;
    margin-bottom: 32px;
  }

  /* Falling drops */
  .drop {
    position: absolute;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    user-select: none;
    pointer-events: none;
    top: -80px;
    color: #ddd;
  }

  .drop.small-start {
    font-size: 20px;
    color: #ccc;
    opacity: 0.7;
  }

  .drop.settling {
    transition: color 0.8s ease, font-size 1s cubic-bezier(0.34, 1.4, 0.64, 1),
                letter-spacing 0.8s ease, transform 0.8s cubic-bezier(0.34, 1.4, 0.64, 1),
                opacity 0.6s ease;
  }

  .drop.big {
    font-size: 96px;
    color: var(--black);
    letter-spacing: -3px;
    opacity: 1;
  }

  .drop.red {
    color: #a83a3a;
  }

  .message-block {
    text-align: center;
    max-width: 520px;
    opacity: 0;
    transition: opacity 1s ease;
    position: relative;
    z-index: 2;
  }

  .message-block.visible { opacity: 1; }

  .message {
    font-size: 15px;
    line-height: 1.9;
    color: #333;
    margin-bottom: 8px;
  }

  .message em {
    font-family: Georgia, serif;
    font-style: italic;
    color: #a83a3a;
  }

  .submessage {
    font-size: 12px;
    line-height: 1.8;
    color: #666;
    margin-bottom: 40px;
  }

  .home-link {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #3a7a3a;
    text-decoration: none;
    position: relative;
    padding-bottom: 5px;
    display: inline-block;
  }

  .home-link::after {
    content: '';
    display: block;
    width: 100%;
    height: 1px;
    background: #3a7a3a;
    position: absolute;
    left: 0;
    bottom: 0;
    transition: opacity 0.2s;
  }

  .home-link:hover::after { opacity: 0.4; }

  /* Footer */
  .footer-block {
    position: fixed;
    bottom: 40px;
    left: 0;
    right: 0;
    text-align: center;
    opacity: 0;
    transition: opacity 1s ease;
    z-index: 2;
    padding: 0 40px;
  }

  .footer-block.visible { opacity: 1; }

  .rule {
    display: flex;
    justify-content: center;
    gap: 48px;
    margin: 0 auto 24px;
    max-width: 600px;
  }

  .rule > span {
    display: block;
    width: 4px;
    height: 4px;
    background: var(--rule);
  }

  .rule > span:nth-child(1) { background: #a83a3a; }
  .rule > span:nth-child(2) { background: #8c4a3a; }
  .rule > span:nth-child(3) { background: #715a3a; }
  .rule > span:nth-child(4) { background: #566a3a; }
  .rule > span:nth-child(5) { background: #3a7a3a; }

  .footer-text {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #666;
    line-height: 1.8;
    max-width: 600px;
    margin: 0 auto;
  }

  .footer-text .copyright {
    color: #999;
  }

  @media (max-width: 600px) {
    .footer-block {
      padding: 0 24px;
      bottom: 24px;
    }
    .footer-text {
      font-size: 9px;
    }
    .drop.big { font-size: 56px; letter-spacing: -1px; }
    .code-container { min-height: 80px; }
  }
  }
</style>
</head>
<body>

  <div class="stage">
    <div class="code-container" id="code-container"></div>

    <div class="message-block" id="message-block">
      <p class="message">🧭 You&#x2019;ve found a page that&#x2019;s <em>very</em> lost.</p>
      <p class="submessage">Maybe it went to 🤠 Austin for tacos 🌮. Maybe it never existed.<br>Either way, let&#x2019;s get you back.</p>
      <a href="/" class="home-link">Take me home &rarr;</a>
    </div>
  </div>

  <div class="footer-block" id="footer-block">
    <div class="rule">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <p class="footer-text">
      🤠 Made in Austin, TX ✌️ by 97 112 99<br>
      <span class="copyright">&copy; <span id="year"></span> 97 112 99 LLC. All rights reserved.</span>
    </p>
  </div>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const container = document.getElementById('code-container');
  const chars = ['9', '7', '1', '2', '4', '0', '·', '↘', '↗'];
  const shades = ['#e8e8e8', '#dddddd', '#eeeeee', '#f0e5e5', '#e5f0e5'];

  // Compute target positions for 4, 0, 4 in the code container
  function getTargetPositions() {
    const rect = container.getBoundingClientRect();
    const centerX = window.innerWidth / 2;
    const centerY = rect.top + rect.height / 2;
    // Approx spacing for 96px chars, ~68px wide + 24px gap = 92px between centers
    const gap = 92;
    return [
      { x: centerX - gap, y: centerY, char: '4', color: 'black' },
      { x: centerX,       y: centerY, char: '0', color: 'red' },
      { x: centerX + gap, y: centerY, char: '4', color: 'black' },
    ];
  }

  const settledChars = [];  // Drops that landed as 404

  function spawnDrop(mustBeChar = null) {
    const el = document.createElement('div');
    el.className = 'drop';
    const ch = mustBeChar || chars[Math.floor(Math.random() * chars.length)];
    el.textContent = ch;
    el.style.left = Math.random() * 100 + 'vw';
    const size = 14 + Math.random() * 22;
    el.style.fontSize = size + 'px';
    el.style.opacity = 0.4 + Math.random() * 0.5;
    el.style.color = shades[Math.floor(Math.random() * shades.length)];

    document.body.appendChild(el);

    const duration = 2200 + Math.random() * 2500;
    const startTime = performance.now();
    const endY = window.innerHeight + 100;

    function animate(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      if (el._settled) return;
      if (progress >= 1) {
        el.remove();
        return;
      }
      el.style.transform = `translateY(${progress * endY}px)`;
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
    return el;
  }

  // Send a drop that will settle into a target position
  function spawnSettlingDrop(target, delay) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'drop';
      el.textContent = target.char;
      // Position at target column initially
      el.style.left = target.x + 'px';
      el.style.top = '-80px';
      el.classList.add('small-start');
      document.body.appendChild(el);

      const settleDuration = 1400;
      const startTime = performance.now();
      const settleY = target.y;

      function animate(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / settleDuration, 1);
        // Ease out
        const eased = 1 - Math.pow(1 - progress, 3);
        const currentY = -80 + eased * (settleY + 80);
        el.style.transform = `translateY(${currentY}px) translateX(-50%)`;

        if (progress >= 1) {
          el._settled = true;
          // Bloom to big style
          el.classList.add('settling');
          requestAnimationFrame(() => {
            el.classList.remove('small-start');
            el.classList.add('big');
            if (target.color === 'red') el.classList.add('red');
          });
          return;
        }
        requestAnimationFrame(animate);
      }
      requestAnimationFrame(animate);
      settledChars.push(el);
    }, delay);
  }

  // Waterfall
  let waterfallInterval = setInterval(() => spawnDrop(), 60);

  // Phase 1: after ~1.2s of waterfall, send the 4, 0, 4 drops one by one
  const targets = getTargetPositions();
  spawnSettlingDrop(targets[0], 1200);
  spawnSettlingDrop(targets[1], 1500);
  spawnSettlingDrop(targets[2], 1800);



  // Show message
  setTimeout(() => {
    document.getElementById('message-block').classList.add('visible');
  }, 3600);

  // Show footer
  setTimeout(() => {
    document.getElementById('footer-block').classList.add('visible');
    // Slow the waterfall
    clearInterval(waterfallInterval);
    waterfallInterval = setInterval(() => spawnDrop(), 300);
  }, 4400);
</script>
</body>
</html>
